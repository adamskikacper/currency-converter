@if (isLoading) {
  <p class="label"><b>Converting...</b></p>
} @else if (conversionValue) {
  <p class="label"><b>Converted Amount</b></p>

  <div class="display">
    <span class="display__symbol">{{ toCurrency?.symbol }}</span>
    <span class="display__value">
      <b>{{ conversionValue.value | number: '1.2-2' }}</b>
    </span>
  </div>

  <p class="rate">
    <small
      >1 {{ fromCurrency?.short_code }} = {{ exchangeRate | number: '1.0-2' }} {{ toCurrency?.short_code }}</small
    >
  </p>
}
